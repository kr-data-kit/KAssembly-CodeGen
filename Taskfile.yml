# https://taskfile.dev

version: '3'

includes:
  # If 'bindings' points to Taskfile-core.yml,
  # it doesn't matter if the Taskfile is located in a different directory.
  bindings: ./Taskfile-core.yml

vars:
  MESSAGE: >
    This is a message from the main Taskfile.
    Please customize vars in Taskfile as needed.
  
  # Variables for the build
  BUILD_DIR: ./build
  BINARY_NAME: bind

tasks:
  default:
    cmds:
      - task: bindings:default
        vars:
          OVERRIDE_MESSAGE:
            ref: .MESSAGE
    silent: true

  build:
    desc: "Build the openassemblybinder binary"
    cmds:
      - task: bindings:build
        vars:
          BUILD_DIR:
            ref: .BUILD_DIR
          BINARY_NAME:
            ref: .BINARY_NAME
    silent: true
  
  list:
    desc: "List all api in openassembly API"
    deps:
      - task: build
    cmds:
      - task: bindings:list
        vars:
          BUILD_DIR:
            ref: .BUILD_DIR
          BINARY_NAME:
            ref: .BINARY_NAME
    silent: true

  generate:
    desc: "Generate the OpenAssembly client code"
    deps:
      - task: build
    cmds:
      - task: bindings:generate
    silent: true