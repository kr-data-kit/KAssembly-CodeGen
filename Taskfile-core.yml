# https://taskfile.dev
version: '3'

vars:
  MESSAGE: >
    This is a sample message from the openassemblybinder Taskfile. You can customize it as needed.

tasks:
  default:
    vars:
      MESSAGE: '{{ .OVERRIDE_MESSAGE | default .MESSAGE}}'
    cmds:
      - echo "{{.MESSAGE}}"
    silent: true

  prepare:
    internal: true
    cmds:
      - cmd: echo "Preparing directory {{.DIR}}"
      - cmd: mkdir -p "{{.DIR}}"
        platforms: [linux, darwin]
      - cmd: mkdir "{{fromSlash .DIR}}" 2>nul || (exit 0)
        platforms: [windows]
    silent: true
  
  build:
    desc: "Build the openassemblybinder binary"
    vars:
      BINARY_FILE: '{{.BINARY_NAME | default "openassemblybinder"}}{{if eq OS "windows"}}.exe{{end}}'
      BUILD_DIR: '{{.BUILD_DIR | default (joinPath .TASKFILE_DIR "./build")| clean | toSlash}}'
      MAIN_DIR: '{{joinPath .TASKFILE_DIR "cmd" | clean | toSlash}}'
    cmds:
      - task: prepare
        vars:
          DIR:
            ref: .BUILD_DIR
      - cmd: >
          go build 
          -C "{{.TASKFILE_DIR}}" 
          -o "{{.BUILD_DIR}}/{{.BINARY_FILE}}" 
          .
        dir: "{{.TASKFILE_DIR}}"
    silent: true
  
  list:
    desc: "List all api in openassembly API"
    vars:
      BINARY_FILE: '{{.BINARY_NAME | default "openassemblybinder"}}{{if eq OS "windows"}}.exe{{end}}'
      BUILD_DIR: '{{.BUILD_DIR | default (joinPath .TASKFILE_DIR "./build")| clean | toSlash }}'
      BINARY_PATH: "{{joinPath .BUILD_DIR .BINARY_FILE | clean | toSlash}}"
    cmds:
      - cmd: echo "Listing APIs using binary at {{.BINARY_PATH}}"
      - cmd: "{{.BINARY_PATH}} list"
    silent: true

  generate:
    desc: "Generate the OpenAssembly client code"
    vars:
      BINARY_FILE: '{{.BINARY_NAME | default "openassemblybinder"}}{{if eq OS "windows"}}.exe{{end}}'
      BUILD_DIR: '{{.BUILD_DIR | default (joinPath .TASKFILE_DIR "./build")| clean | toSlash}}'
      BINARY_PATH: "{{joinPath .BUILD_DIR .BINARY_FILE | clean | toSlash}}"

      TARGET_DIR: '{{.TARGET_DIR | default (joinPath .TASKFILE_DIR "./out")| clean | toSlash}}'
      PACKAGE_NAME: '{{.PACKAGE_NAME | default "openassemblyclient"}}'
    cmds:
      - cmd: echo "Generating client code using binary at {{.BINARY_PATH}}"
      - cmd: > 
          {{.BINARY_PATH}} generate 
          --package {{.PACKAGE_NAME}} 
          --client {{.CLIENT_NAME}} 
          --output {{.TARGET_DIR}} 
          {{if eq .CREATE_DIR true}}--create-dir{{end}}
    silent: true